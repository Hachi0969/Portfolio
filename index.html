<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio website for Min Swe Thein, a Digital Technology Innovation student and aspiring AI engineer in Bangkok.">
  <title>Min Swe Thein | AI Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#263241",
            muted: "#64748b",
            line: "#e2e8f0",
            accent: "#38bdf8",
            accentDark: "#0284c7"
          },
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui", "Segoe UI", "sans-serif"]
          },
          boxShadow: {
            soft: "0 18px 50px rgba(15, 23, 42, 0.08)"
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="bg-white text-ink antialiased">
  <header class="sticky top-0 z-40 border-b border-line bg-white/90 backdrop-blur">
    <nav class="mx-auto flex max-w-6xl items-center justify-between px-5 py-4">
      <a href="#home" class="text-sm font-bold tracking-wide text-ink">Min Swe Thein</a>
      <button id="menu-toggle" class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-line text-ink md:hidden" aria-label="Open navigation" aria-expanded="false">
        <span class="menu-line"></span>
      </button>
      <div id="site-menu" class="hidden items-center gap-1 md:flex">
        <a class="nav-link" href="#projects">Projects</a>
        <a class="nav-link" href="#about">About</a>
        <a class="nav-link" href="#blog">Blog</a>
        <a class="nav-link" href="#contact">Contact</a>
      </div>
    </nav>
    <div id="mobile-menu" class="hidden border-t border-line bg-white px-5 pb-4 md:hidden">
      <a class="mobile-link" href="#projects">Projects</a>
      <a class="mobile-link" href="#about">About</a>
      <a class="mobile-link" href="#blog">Blog</a>
      <a class="mobile-link" href="#contact">Contact</a>
    </div>
  </header>

  <main>
    <section id="home" class="mx-auto grid min-h-[calc(100vh-73px)] max-w-6xl items-center gap-10 px-5 py-16 md:grid-cols-[1.15fr_0.85fr] md:py-20">
      <div>
        <p id="profile-location" class="mb-5 text-sm font-semibold uppercase tracking-[0.22em] text-accentDark"></p>
        <h1 id="profile-name" class="max-w-3xl text-4xl font-extrabold leading-tight text-ink sm:text-5xl lg:text-6xl"></h1>
        <p id="profile-headline" class="mt-5 max-w-2xl text-xl font-medium leading-8 text-slate-600"></p>
        <p id="profile-summary" class="mt-5 max-w-2xl text-base leading-8 text-muted"></p>
        <div id="hero-actions" class="mt-8 flex flex-wrap gap-3"></div>
        <div id="hero-stats" class="mt-10 grid max-w-2xl grid-cols-1 gap-3 sm:grid-cols-3"></div>
      </div>
      <div class="flex justify-center md:justify-end">
        <div class="relative">
          <div class="absolute inset-0 translate-x-5 translate-y-5 rounded-full bg-sky-100"></div>
          <div id="profile-photo" class="relative flex aspect-square w-64 items-center justify-center rounded-full border border-line bg-white shadow-soft sm:w-80"></div>
        </div>
      </div>
    </section>

    <section id="projects" class="border-y border-line bg-slate-50/70">
      <div class="mx-auto max-w-6xl px-5 py-16 md:py-20">
        <div class="flex flex-col gap-5 md:flex-row md:items-end md:justify-between">
          <div>
            <p class="section-kicker">Selected Work</p>
            <h2 class="section-title">Projects</h2>
          </div>
          <div id="project-filters" class="flex flex-wrap gap-2"></div>
        </div>
        <div id="projects-grid" class="mt-8 grid gap-5 md:grid-cols-2 xl:grid-cols-3"></div>
      </div>
    </section>

    <section id="about" class="mx-auto max-w-6xl px-5 py-16 md:py-20">
      <div class="grid gap-10 lg:grid-cols-[0.95fr_1.05fr]">
        <div>
          <p class="section-kicker">Background</p>
          <h2 class="section-title">About Me & Credentials</h2>
          <div id="about-copy" class="mt-6 space-y-4 text-base leading-8 text-muted"></div>
          <div id="icebreakers" class="mt-8 grid gap-3"></div>
        </div>
        <div class="space-y-6">
          <div>
            <h3 class="sub-title">Tech Stack</h3>
            <div id="tech-stack" class="mt-4 grid grid-cols-2 gap-3 sm:grid-cols-3"></div>
          </div>
          <div>
            <h3 class="sub-title">Certifications</h3>
            <div id="certifications" class="mt-4 grid gap-3"></div>
          </div>
        </div>
      </div>
    </section>

    <section id="blog" class="border-y border-line bg-slate-50/70">
      <div class="mx-auto max-w-6xl px-5 py-16 md:py-20">
        <p class="section-kicker">Writing</p>
        <h2 class="section-title">Blog</h2>
        <div id="blog-list" class="mt-8 divide-y divide-line rounded-lg border border-line bg-white"></div>
      </div>
    </section>

    <section id="contact" class="mx-auto max-w-6xl px-5 py-16 md:py-20">
      <div class="grid gap-8 md:grid-cols-[1fr_auto] md:items-center">
        <div>
          <p class="section-kicker">Contact</p>
          <h2 class="section-title">Let's Connect</h2>
          <p class="mt-4 max-w-2xl leading-8 text-muted">Open to AI engineering learning opportunities, data projects, internships, and collaborations.</p>
        </div>
        <div id="contact-actions" class="flex flex-wrap gap-3"></div>
      </div>
    </section>
  </main>

  <footer class="border-t border-line px-5 py-8 text-center text-sm text-muted">
    <p id="footer-copy"></p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
